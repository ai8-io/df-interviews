services:
  db:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: chatbot
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot"]
      interval: 5s
      timeout: 3s
      retries: 5

  inngest:
    image: inngest/inngest:v1.8.2
    command: >
      inngest start
      -u http://host.docker.internal:8000/api/inngest
    ports:
      - "8388:8288"
    environment:
      INNGEST_EVENT_KEY: event-key
      INNGEST_SIGNING_KEY: DEADBEEF

volumes:
  pgdata:
